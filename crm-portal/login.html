<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-M Travel CRM — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060910;
      --surface: #0d1117;
      --border: rgba(255,255,255,0.07);
      --accent: #2563eb;
      --accent-glow: rgba(37,99,235,0.3);
      --gold: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
      --error: #ef4444;
      --success: #22c55e;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%);
      top: -100px; left: -100px;
      z-index: 0;
    }
    .login-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
      animation: slideUp 0.5s ease forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(37,99,235,0.05);
    }
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--error);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .role-badge {
      display: inline-block;
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.2);
      color: var(--accent);
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 24px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="login-card">
    <div class="login-logo">A-M <span>Travel</span></div>
    <div class="login-sub">Internal CRM System</div>
    <div class="role-badge">🔐 Authorized Personnel Only</div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@amtravel.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="login-footer">A-M Travel and Tours © 2026 — Internal Use Only</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="js/config.js" defer></script>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      err.classList.remove('show');

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Invalid email or password. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      window.location.href = 'dashboard.html';
    }

    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.classList.add('show');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    // Redirect if already logged in
    window.addEventListener('load', async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
