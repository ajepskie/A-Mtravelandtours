<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-M Travel CRM — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/crm.css"/>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">A-M <span>Travel</span></div>
    <div class="sidebar-role" id="sidebarRole">Loading...</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active">📊 Dashboard</a>
      <a href="clients.html" class="nav-item">👥 Clients</a>
      <a href="add-client.html" class="nav-item">➕ Add Client</a>
      <a href="backup.html" class="nav-item admin-only" style="display:none">💾 Backup</a>
      <a href="users.html" class="nav-item superadmin-only" style="display:none">⚙️ Manage Users</a>
    </nav>
    <button class="btn-logout" onclick="handleLogout()">🚪 Sign Out</button>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-sub">Welcome back, <span id="userName">—</span></p>
      </div>
      <div class="topbar-right">
        <div class="role-pill" id="rolePill">—</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-num" id="totalClients">—</div>
        <div class="stat-label">Total Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🆕</div>
        <div class="stat-num" id="newClients">—</div>
        <div class="stat-label">New</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-num" id="inProgressClients">—</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-num" id="completedClients">—</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <!-- RECENT CLIENTS -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Recent Clients</h2>
        <a href="clients.html" class="btn-link">View All →</a>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Nationality</th>
              <th>Trip Type</th>
              <th>Status</th>
              <th class="admin-only ts-col" style="display:none">Created At</th>
            </tr>
          </thead>
          <tbody id="recentTable">
            <tr><td colspan="5" class="empty-row">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="js/config.js" defer></script>
  <script src="js/auth.js"></script>
  <script>
    let currentRole = '';

    window.addEventListener('load', async () => {
      const user = await requireAuth();
      const profile = await getProfile(user.id);
      currentRole = profile.role;

      document.getElementById('userName').textContent = profile.full_name || user.email;
      document.getElementById('sidebarRole').textContent = roleLabel(currentRole);
      document.getElementById('rolePill').textContent = roleLabel(currentRole);
      document.getElementById('rolePill').className = `role-pill role-${currentRole}`;

      // Show role-based nav
      if (currentRole === 'admin' || currentRole === 'superadmin') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
        document.querySelectorAll('.ts-col').forEach(el => el.style.display = '');
      }
      if (currentRole === 'superadmin') {
        document.querySelectorAll('.superadmin-only').forEach(el => el.style.display = '');
      }

      loadStats();
      loadRecentClients();
    });

    async function loadStats() {
      const { data } = await supabaseClient.from('clients').select('status');
      if (!data) return;
      document.getElementById('totalClients').textContent = data.length;
      document.getElementById('newClients').textContent = data.filter(c => c.status === 'New').length;
      document.getElementById('inProgressClients').textContent = data.filter(c => c.status === 'In Progress').length;
      document.getElementById('completedClients').textContent = data.filter(c => c.status === 'Completed').length;
    }

    async function loadRecentClients() {
      const { data } = await supabaseClient
        .from('clients')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(5);

      const tbody = document.getElementById('recentTable');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-row">No clients yet.</td></tr>';
        return;
      }

      const isAdmin = currentRole === 'admin' || currentRole === 'superadmin';
      tbody.innerHTML = data.map(c => `
        <tr>
          <td><a href="client-detail.html?id=${c.id}" class="client-link">${c.full_name}</a></td>
          <td>${c.nationality || '—'}</td>
          <td>${c.trip_type || '—'}</td>
          <td><span class="status-badge status-${slugify(c.status)}">${c.status}</span></td>
          ${isAdmin ? `<td class="ts-col">${formatDate(c.created_at)}</td>` : ''}
        </tr>
      `).join('');
    }

    function roleLabel(r) {
      return { superadmin: '👑 Super Admin', admin: '🔧 Admin', worker: '👷 Worker', tester: '🧪 Tester' }[r] || r;
    }

    function slugify(s) { return (s || '').toLowerCase().replace(/\s+/g, '-'); }
    function formatDate(d) { return d ? new Date(d).toLocaleString() : '—'; }
  </script>
</body>
</html>
