<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>const theme = localStorage.getItem("amt-theme") || "dark";document.documentElement.setAttribute("data-theme", theme);</script>
<title>A-M Travel CRM — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/crm.css"/>
  <link rel="stylesheet" href="../assets/logos.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060910;
      --surface: #0d1117;
      --border: rgba(255,255,255,0.07);
      --accent: #2563eb;
      --accent-glow: rgba(37,99,235,0.3);
      --text: #f1f5f9;
      --muted: #64748b;
      --error: #ef4444;
      --success: #22c55e;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%);
      top: -100px; left: -100px;
      z-index: 0;
    }
    .register-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    .login-logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .login-logo span { color: var(--accent); }
    .login-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; }
    input:focus, select:focus { border-color: var(--accent); background: rgba(37,99,235,0.05); }
    .btn-register { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; margin-top: 12px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--error); }
    .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--success); }
    .login-footer { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.78rem; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="register-card">
    <div class="login-logo">A-M <span>Travel</span></div>
    <div class="login-sub">Create your CRM access request</div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg_name" placeholder="Your Full Name"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reg_email" placeholder="you@amtravel.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg_password" placeholder="••••••••" minlength="6"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="reg_password_confirm" placeholder="••••••••"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="reg_role">
        <option value="Employee / Worker">Worker</option>
        <option value="Employee / Worker">Employee</option>
      </select>
    </div>

    <button class="btn-register" id="registerBtn" onclick="handleRegister()">Submit Registration</button>
    <div class="msg" id="registerMsg"></div>
    <div class="login-footer">
      Already have an account? <a href="login.html" style="color:var(--accent);text-decoration:none;font-weight:500;">Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    function showMessage(msg, type) {
      const box = document.getElementById('registerMsg');
      box.textContent = msg;
      box.className = `msg show ${type}`;
    }

    async function handleRegister() {
      const name = document.getElementById('reg_name').value.trim();
      const email = document.getElementById('reg_email').value.trim();
      const password = document.getElementById('reg_password').value;
      const confirmPassword = document.getElementById('reg_password_confirm').value;
      const role = document.getElementById('reg_role').value;
      const btn = document.getElementById('registerBtn');

      if (!name || !email || !password || !confirmPassword) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: name,
            role
          }
        }
      });

      if (signUpError) {
        showMessage('Registration error: ' + signUpError.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Submit Registration';
        return;
      }

      if (!signUpData.user) {
        showMessage('Registration failed. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Submit Registration';
        return;
      }

      showMessage('Registration submitted. Awaiting admin approval.', 'success');
      btn.disabled = false;
      btn.textContent = 'Submit Registration';
      document.getElementById('reg_name').value = '';
      document.getElementById('reg_email').value = '';
      document.getElementById('reg_password').value = '';
      document.getElementById('reg_password_confirm').value = '';
    }
  </script>
</body>
</html>
