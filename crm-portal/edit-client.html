<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-M Travel CRM — Edit Client</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/crm.css"/>
  <link rel="stylesheet" href="../assets/logos.css"/>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo-container">
      <img src="../assets/images/am-logomark.png" alt="A-M Travel Logo" class="logo-image">
      <div class="sidebar-logo">A-M <span>Travel</span></div>
    </div>
    <div class="sidebar-role" id="sidebarRole">Loading...</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <a href="clients.html" class="nav-item">👥 Clients</a>
      <a href="add-client.html" class="nav-item">➕ Add Client</a>
      <a href="backup.html" class="nav-item admin-only" style="display:none">💾 Backup</a>
      <a href="users.html" class="nav-item superadmin-only" style="display:none">⚙️ Manage Users</a>
    </nav>
    <button class="btn-logout" onclick="handleLogout()">🚪 Sign Out</button>
  </aside>

  <main class="main-content">
    <a href="clients.html" class="back-btn">← Back to Clients</a>
    <div class="topbar">
      <div>
        <h1 class="page-title">Edit Client</h1>
        <p class="page-sub" id="clientNameSub">Loading...</p>
      </div>
    </div>

    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="full_name" placeholder="e.g. Juan dela Cruz"/>
        </div>
        <div class="form-group">
          <label>Passport Number</label>
          <input type="text" id="passport_number" placeholder="e.g. P1234567A"/>
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <input type="text" id="contact" placeholder="e.g. +63 917 123 4567"/>
        </div>
        <div class="form-group">
          <label>Nationality</label>
          <input type="text" id="nationality" placeholder="e.g. Filipino"/>
        </div>
        <div class="form-group">
          <label>Trip Type</label>
          <select id="trip_type">
            <option value="">Select trip type</option>
            <option>🏖️ Vacation</option>
            <option>💼 Business Trip</option>
            <option>🚨 Emergency Travel</option>
            <option>✈️ OFW / Balikbayan</option>
            <option>🌍 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Registered Date</label>
          <input type="date" id="registered_date"/>
        </div>
        <div class="form-group">
          <label>Source of Lead</label>
          <select id="source_of_lead">
            <option value="">Select source</option>
            <option>📘 Facebook</option>
            <option>📷 Instagram</option>
            <option>🔍 Google</option>
            <option>💬 WhatsApp</option>
            <option>🐦 Twitter/X</option>
            <option>🔗 LinkedIn</option>
            <option>👥 Referral</option>
            <option>🌐 Other Social Media</option>
            <option>📞 Direct Call</option>
            <option>🤝 Walk-in</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option value="Converted">✅ Converted</option>
            <option value="Loss">❌ Loss</option>
          </select>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Notes</label>
          <textarea id="notes" placeholder="Any additional notes..."></textarea>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Replace Document (optional)</label>
          <div class="file-upload" onclick="document.getElementById('docFile').click()">
            <input type="file" id="docFile" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(event)"/>
            <div class="file-upload-label">
              <div style="font-size:2rem;margin-bottom:8px;">📎</div>
              <div>Click to upload a new document</div>
              <div style="font-size:0.75rem;margin-top:4px;">Replaces existing document</div>
              <div id="fileName" style="color:var(--accent);margin-top:8px;font-size:0.85rem;"></div>
            </div>
          </div>
          <div id="currentDoc" style="margin-top:10px;font-size:0.85rem;color:var(--muted);"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveBtn" onclick="updateClient()">💾 Save Changes</button>
        <a href="clients.html" class="btn btn-ghost">Cancel</a>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="js/config.js" defer></script>
  <script src="js/auth.js"></script>
  <script>
    let currentUser = null;
    let clientId = null;
    let existingDocUrl = null;

    window.addEventListener('load', async () => {
      const user = await requireAuth();
      currentUser = user;
      const profile = await getProfile(user.id);

      // Only admin & superadmin can edit
      if (profile.role === 'worker' || profile.role === 'tester') {
        alert('You do not have permission to edit clients.');
        window.location.href = 'clients.html';
        return;
      }

      document.getElementById('sidebarRole').textContent = roleLabel(profile.role);
      if (profile.role === 'admin' || profile.role === 'superadmin') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
      }
      if (profile.role === 'superadmin') {
        document.querySelectorAll('.superadmin-only').forEach(el => el.style.display = '');
      }

      const params = new URLSearchParams(window.location.search);
      clientId = params.get('id');
      if (!clientId) { window.location.href = 'clients.html'; return; }

      loadClient();
    });

    async function loadClient() {
      const { data, error } = await supabaseClient
        .from('clients').select('*').eq('id', clientId).single();

      if (error || !data) { window.location.href = 'clients.html'; return; }

      document.getElementById('clientNameSub').textContent = 'Editing: ' + data.full_name;
      document.getElementById('full_name').value = data.full_name || '';
      document.getElementById('passport_number').value = data.passport_number || '';
      document.getElementById('contact').value = data.contact || '';
      document.getElementById('nationality').value = data.nationality || '';
      document.getElementById('trip_type').value = data.trip_type || '';
      document.getElementById('registered_date').value = data.registered_date ? data.registered_date.split('T')[0] : '';
      document.getElementById('source_of_lead').value = data.source_of_lead || '';
      document.getElementById('status').value = data.status || 'Converted';
      document.getElementById('notes').value = data.notes || '';

      existingDocUrl = data.document_url;
      if (existingDocUrl) {
        document.getElementById('currentDoc').innerHTML =
          `📄 Current document: <a href="${existingDocUrl}" target="_blank" style="color:var(--accent)">View Document</a>`;
      }
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) document.getElementById('fileName').textContent = '✅ ' + file.name;
    }

    async function updateClient() {
      const full_name = document.getElementById('full_name').value.trim();
      if (!full_name) { showToast('Full name is required.', 'error'); return; }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      let document_url = existingDocUrl;
      const fileInput = document.getElementById('docFile');

      if (fileInput.files[0]) {
        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        const { error: uploadError } = await supabaseClient
          .storage.from('Client Document').upload(fileName, file);

        if (!uploadError) {
          const { data: urlData } = supabaseClient.storage
            .from('Client Document').getPublicUrl(fileName);
          document_url = urlData.publicUrl;
        }
      }

      const { error } = await supabaseClient.from('clients').update({
        full_name,
        passport_number: document.getElementById('passport_number').value.trim() || null,
        contact: document.getElementById('contact').value.trim() || null,
        nationality: document.getElementById('nationality').value.trim() || null,
        trip_type: document.getElementById('trip_type').value || null,
        registered_date: document.getElementById('registered_date').value || null,
        source_of_lead: document.getElementById('source_of_lead').value || null,
        status: document.getElementById('status').value || 'Converted',
        notes: document.getElementById('notes').value.trim() || null,
        document_url,
        updated_by: currentUser.id,
        updated_at: new Date().toISOString()
      }).eq('id', clientId);

      if (error) {
        showToast('Error updating client: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
        return;
      }

      await logActivity('UPDATE_CLIENT', `Updated client: ${full_name}`);
      showToast('Client updated! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'clients.html', 1500);
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast toast-${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function roleLabel(r) {
      return { superadmin: '👑 Super Admin', admin: '🔧 Admin', worker: '👷 Worker', tester: '🧪 Tester' }[r] || r;
    }
  </script>
</body>
</html>
